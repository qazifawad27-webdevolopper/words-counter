<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <style>
        body{
            padding: opx 100px;
        }
        h1{
            text-align: center;
            background-color: #0067B0;
            color: white;
            padding: 10px;
            margin: 0xpx;
        }
        #textbox{
            width: 99.3%;
            border-color: #0067B0;
            font-size: 15px;
        }
        p{
            text-align: center;
            background-color: #0067B0;
            font-size: 25px;
            font-weight: bold;
            color: white;
            padding: 10px;
            margin: 0px;
        }
    </style>
</head>
<body>
    <h1>Words And character Counter</h1>
    <textarea name="" id="textbox" cols="30" rows="10"></textarea>
    <p>
        <span id="word">0</span>Words And
        <span id="char">0</span>characters
    </p>
    
</body>
<script>
    let textbox = document.getElementById('textbox');
    textbox.addEventListener('input', function(){
        var text = this.value;
        let char = text.length;
        document.getElementById('char').innerHTML = char;

        text = text.trim();
        let words =  text.split(' ');
        let clearlist = words.filter(function(elm){
    return elm != ''
    });
document.getElementById('word').innerHTML = clearlist.length;

    });
</script>
</html>
